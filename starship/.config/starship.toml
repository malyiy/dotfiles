add_newline = false
# A minimal left prompt
format = """$directory$all$character"""
# move the rest of the prompt to the right
right_format = """"""
command_timeout = 1000

[directory]
truncate_to_repo = false

[character]
vicmd_symbol = "[N] >>>"
success_symbol = '[➜](bold green)'

[git_branch]
format =  '[$symbol$branch(:$remote_branch)]($style)'

